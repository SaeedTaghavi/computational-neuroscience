          - "انتگرال‌گیری عددی": ch-num-05-numerical-integration.md
          - "حل عددی معادلات دیفرانسیل معمولی": ch-num-06-ode.md
          - "حل عددی معادلات دیفرانسیل تصادفی": ch-num-07-sde.md
        - "پردازش سیگنال":
          # - "تست": ch-signal-01-fourier.md
