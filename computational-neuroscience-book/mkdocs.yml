site_name: کتاب علوم اعصاب محاسباتی
site_url: https://computational-neuroscience.ir/
site_description: کتاب آنلاین علوم اعصاب محاسباتی به زبان فارسی — از غشای تحریک‌پذیر و سیستم‌های دینامیکی تا مدل‌های نورون، شبکه‌های اسپایکی و مدل‌سازی مغز کامل.
site_author: Saeed Taghavi

theme: 
  direction: rtl
  name: material
  language: custom        # ← must be "custom", not "fa"
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    # - navigation.sections   # render top-level groups as bold section headers, expanded
    # - navigation.indexes    # lets a Part have its own landing page (see below)
    # - navigation.top        # back-to-top button
    # - toc.integrate         # optional: fold the page TOC into the left sidebar
  font: 
    text: Noto Naskh Arabic
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
plugins:
  - search:
      lang:
        - en
        - ar 
nav:
  - صفحه اول: index.md
  - "پیش‌نیازها":
    - "روش‌های عددی و تحلیل داده":
        - "مفاهیم مدل‌سازی":
            - "مفاهیم پایه": ch-modelling-01-overview.md
            - "رده‌بندی مدل‌ها": ch-modelling-02-classification.md
            - "تصمیم‌های مدل‌سازی": ch-modelling-03-decisions.md
            - "رده‌بندی عدم‌قطعیت": ch-modelling-04-uncertainty.md
            - "راستی‌آزمایی و اعتبارسنجی": ch-modelling-05-verify-validate.md
            - "نیکویی برازش": ch-modelling-06-goodness-of-fit.md
        # - "مفاهیم مدل‌سازی و خطا": ch16.md
        - "روش‌های عددی":
          - "مرور مفاهیم پایه": ch-num-01-revision.md
          - "مشتق اول": ch-num-02-derivative.md      # when you write it
          - "تفاضل محدود": ch-num-03-fdm.md           # etc.
